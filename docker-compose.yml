version: "3.9"

services:
  edumind:
    build: .
    container_name: edumind_app
    ports:
      - "5000:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - PORT=5000
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./study_db:/app/study_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
