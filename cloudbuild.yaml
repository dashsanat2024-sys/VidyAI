# Build React (dist/) in Cloud Build, then bake it into the API image.
# Run from this directory: gcloud builds submit --config cloudbuild.yaml .
steps:
  - name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - npm ci && npm run build

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-t"
      - "asia-south1-docker.pkg.dev/arthavi-492410/cloud-run-source-deploy/arthavi-api:latest"
      - "."

images:
  - "asia-south1-docker.pkg.dev/arthavi-492410/cloud-run-source-deploy/arthavi-api:latest"

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
